<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaunaAlerta</title>

    <!--CDN E API DO GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!--FONTES ESPECIFICAS-->
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Archivo+Black&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">    
   
    <!--CDN BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!--LINK COM CSS-->
    <link rel="stylesheet" href="css/index.css">

    <!--CSS DA PÁGINA-->
    <link rel="stylesheet" href="css/index.css">

    <!--ICONE NA ABA DO NAVEGADOR-->
    <link rel="icon" type="image/png" href="img/Logo.ico">
    
</head>

<body>
    
    <div id="header"></div>


    <main>
 
        <!-- BANNER -->
        <section class="banner">
            <div class="overlay">
                <div class="container h-100 d-flex align-items-center">
                    <a href="pages/denuncia.html" class="btn">
                        DENUNCIE AQUI
                    </a>
                </div>
            </div>
        </section>
 
        <!-- COMO FUNCIONA -->
        <section class="como-funciona py-5">
            <div class="container">
 
                <h2 class="section-title text-center mb-4">COMO FUNCIONA?</h2>
 
                <div class="funciona-card mx-auto">
                    <p class="funciona-descricao text-center mb-4">
                        Somos como se fosse uma ponte para você, facilitando a sua denúncia
                        e garantindo que ela chegue nas autoridades certas
                    </p>
 
                    <!-- Fluxo: Usuário → Alerta → Autoridade -->
                    <div class="fluxo d-flex align-items-center justify-content-center gap-3">
 
                        <!-- Usuário -->
                        <div class="fluxo-item text-center">
                            <i class="bi bi-person-fill fluxo-icon"></i>
                        </div>
 
                        <!-- Linha + Ícone de alerta -->
                        <div class="fluxo-linha d-flex align-items-center flex-grow-1 position-relative">
                            <div class="linha"></div>
                            <div class="fluxo-alerta">
                                <i class="bi bi-exclamation-circle-fill"></i>
                            </div>
                        </div>
 
                        <!-- Autoridade -->
                        <div class="fluxo-item text-center">
                            <i class="bi bi-person-badge-fill fluxo-icon"></i>
                        </div>
 
                    </div>
                </div>
 
            </div>
        </section>
 
        <!-- ===== NOTÍCIAS (seção reservada para carrossel futuro) ===== -->
        <section class="noticias py-5">
            <div class="container">
 
                <h2 class="section-title text-center mb-4">NOTÍCIAS</h2>
 
                <!-- Placeholder: carrossel ainda não sei fazer -->
                <div class="noticias-placeholder text-center">
                    <p class="placeholder-texto">
                        <i class="bi bi-newspaper me-2"></i>
                        Carrossel de notícias em breve
                    </p>
                </div>
 
            </div>
        </section>
 
        <!-- ===== PARCEIROS ===== -->
        <section class="parceiros py-5">
            <div class="container">
 
                <h2 class="section-title text-center mb-4">PARCEIROS</h2>
 
                <div class="row justify-content-center align-items-center g-4">
 
                    <!-- IBAMA -->
                    <div class="col-6 col-md-3 text-center">
                        <div class="parceiro-card">
                            <img src="img/Logo_IBAMA.svg.png" alt="IBAMA" class="parceiro-logo">
                            <p class="parceiro-nome"><br></p>
                        </div>
                    </div>
 
                    <!-- IPÊ -->
                    <div class="col-6 col-md-3 text-center">
                        <div class="parceiro-card">
                            <img src="img/logo-ipe.png" alt="IPÊ" class="parceiro-logo">
                            <p class="parceiro-nome"></p>
                        </div>
                    </div>
 
                    <!-- AMBIENTAL -->
                    <div class="col-6 col-md-3 text-center">
                        <div class="parceiro-card">
                            <img src="img/ambiental-logo.png" alt="Ambiental" class="parceiro-logo">
                            <p class="parceiro-nome"></p>
                        </div>
                    </div>
 
                    <!-- ICMBio -->
                    <div class="col-6 col-md-3 text-center">
                        <div class="parceiro-card">
                            <img src="img/ICMBio LOGO.png.png" alt="ICMBio" class="parceiro-logo">
                            <p class="parceiro-nome"></p>
                        </div>
                    </div>
 
                </div>
 
            </div>
        </section>
 
    </main>

    <div id="footer"></div>

<!-- SCRIPTS -->
<script src="/js/components.js"></script>
</body>
</html>

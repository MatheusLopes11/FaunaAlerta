<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaunaAlerta</title>

    <!--CDN E API DO GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!--FONTES ESPECIFICAS-->
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Archivo+Black&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">    
   
    <!--CDN BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!--LINK COM CSS-->
    <link rel="stylesheet" href="../css/login.css">

    <!--ICONE NA ABA DO NAVEGADOR-->
    <link rel="icon" type="image/png" href="../img/Logo.ico">
    
</head>

<body>
    
    <div id="header"></div>     

    <main class="d-flex align-items-center justify-content-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    
                    <h1 class="text-center mb-4 titulo-cadastro">EFETUE O CADASTRO</h1>

                    <div class="card-cadastro p-4 p-sm-5">
                        <form>
                            
                            <div class="mb-4">
                                <label class="form-label label-cadastro">E-mail</label>
                                <input type="email" class="form-control input-cadastro" placeholder="E-mail" required>
                            </div>

                            <div class="mb-5">
                                <label class="form-label label-cadastro">Senha</label>
                                <input type="password" class="form-control input-cadastro" placeholder="Senha" required>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-cadastro-laranja" onclick="realizarLogin()">ENTRAR</button>
                            </div>
                            <br>
                            <p class="nao-possui text-center mt-3 mb-0">
                                Não possui conta?
                            </p>
                            
                            <p class="clique-aqui text-center mt-3 mb-0">
                                <a href="cadastro.html"><b>Clique aqui</b></a>
                            </p>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main> 

    <div id="footer"></div>

<!-- SCRIPTS -->
<script src="../js/components.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

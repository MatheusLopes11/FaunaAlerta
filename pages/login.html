<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaunaAlerta</title>

    <!--CDN E API DO GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!--FONTES ESPECIFICAS-->
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Archivo+Black&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">    
   
    <!--CDN BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!--LINK COM CSS-->
    <link rel="stylesheet" href="../css/style.css">

    <!--ICONE NA ABA DO NAVEGADOR-->
    <link rel="icon" type="image/png" href="../img/Logo.ico">
    
</head>

<body>
    
    <div id="header"></div>

    
    <main class="py-5">

        <!--Nessa sessão fica o forms para efetuar o Login -->
        
        <section class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    <h2 class="row justify-content-center">EFETUE O LOGIN</h2>
                    <div class="card py-5 shadow-sm">

                        <div id="mensagem"></div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" placeholder="Nome ou email">
                        </div>

                        <div>
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Senha">
                        </div>

                        <button class="btn byn-dark w-100" onclick="realizarLogin()">Entrar</button>

                        <p class="text-center mt-3 mb-0">
                            Não possui conta?
                        </p>

                        <p class="text-center mt-3 mb-0">
                            <a href="cadastro.html">Clique aqui</a>
                        </p>

                    </div>
                </div>
            </div>

        </section>
    </main>

    <div id="footer"></div>

<!-- SCRIPTS -->
<script src="../js/components.js"></script>
</body>
</html>

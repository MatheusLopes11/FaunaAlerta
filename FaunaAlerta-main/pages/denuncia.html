<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaunaAlerta</title>

        <!--CDN E API DO GOOGLE FONTS-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <!--FONTES ESPECIFICAS-->
        <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Archivo+Black&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">    
    
        <!--CDN BOOTSTRAP-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <!--LINK COM CSS DE DENUNCIA-->
       <link rel="stylesheet" href="../css/denuncia.css">

        <!--ICONE NA ABA DO NAVEGADOR-->
        <link rel="icon" type="image/png" href="../img/Logo1.png">
</head>
<!--Cor de fundo-->
<body style="background-color: #D5D1CA">
    
    <header>
        <div id = "header"></div>
    </header>

    <main>
        <h1 class = "Titulo">Registre sua denúncia</h1>
        
        <!--formulario de denuncia-->
        <div class="conteiner">
            <form>
                <div class = "campo input-efeito">
                    <label for="Tipo de denuncia">Tipo de denúncia</label>
                    <!--campos de seleçao do tipo de denuncia-->
                    <select class="input-efeito">
                        <option value="Caça ilegal">Caça ilegal</option>
                        <option value="Pesca ilegal">Pesca ilegal</option>
                        <option value="Maus-tratos">Maus-tratos</option>                            <option value="Tráfico ilegal de aniamis">Tráfico ilegal de animal</option>
                        <option value="Abandono">Abandono</option>
                        <option value="Espetáculo cruel(Rinha)">Espetáculo cruel (Rinha ou exibição de sofrimento animal alheio)</option>
                        <option value="Zoofilia">Zoofilia</option>
                        <option value="Destruição de áreas preservadas">Destruição de area preservada</option>
                        <option value="Queimadas ilegais">Queimada ilegal</option>
                        <option value="Dificultar fiscalização ambiental">Dificultar fiscalização ambiental</option>
                        <option value="Descarte de lixo em área de preservação">Descarte de lixo em area de preservação</option>
                    </select>
                </div>
                
                <!-- autor do crime-->
                <div class = "campo">
                  <label for="Possível autor">Possível autor</label>
                  <input class="input-efeito" type="text" name="Possível autor" required>
                </div>

                <!--Local-->
                <div class = "campo">
                    <label for="Local do ocorrido">Local do ocorrido</label>
                    <input class="input-efeito" type="text" name="local do ocorrido" required>
                </div>

                <!--Inserir imagem-->
                <div class = "campo">
                    <label for="Imagem">Imagem(opcional)</label>
                    <input class="input-efeito" type="file" name="Imagem(opcional)">
                </div>

                <!--Inserir video-->
                <div class = "campo">
                    <label for="Vídeo">Vídeo(opcional)</label>
                    <input class="input-efeito" type="file" name="Vídeo(opcional)">
                </div>

                <div class = "campo">
                    <label for="Descrição"> Descrição</label>
                    <input class ="desc input-efeito" type="text" name="Descrição do ocorrido" placeholder="descreva o caso da denúncia...">
                </div>
            </form>

            <!--botoes-->
            <div style="flex-direction: row" >
                <button type ="submit" class ="botao" style="justify-content: flex-start;
                 margin-right: 22%; margin-left: 5%"> ENVIAR</button>
                <button type = "submit" class ="botao" style="justify-content: flex-end;
                 margin-left: 22%; margin-right: 5%;"> VOLTAR</button>
            </div>
        </div>
    </main>
    
    <footer>
        <div id = "footer"></div>
    </footer>
</body>
</html>
